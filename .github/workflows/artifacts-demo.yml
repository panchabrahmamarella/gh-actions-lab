name: Artifacts Demo

on:
  workflow_dispatch:

jobs:
  create_artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Create File
        run: |
          echo "DevOps with GitHub Actions" > output.txt
          cat output.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-artifact
          path: output.txt

  download_artifact:
    runs-on: ubuntu-latest

    needs: create_artifact

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: demo-artifact

      - name: Read Downloaded File
        run: |
          ls -la
          cat output.txt
