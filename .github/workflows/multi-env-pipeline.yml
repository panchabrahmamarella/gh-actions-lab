name: Milti Environment Pipeline

on:
  push:
    branches:
      - dev
      - main
      - release

jobs:
  build_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show current branch
        run: echo "Current branch is $GITHUB_REF_NAME"

      - name: Build docker image
        run: docker build -t multi-env-app .

  push_job:
    runs-on: ubuntu-latest
    needs: build_job
    if: github.ref_name == 'main'

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build tagged image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/python-demo-app:main .

      - name: Push docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/python-demo-app:main

  production_deploy:
    runs-on: ubuntu-latest
    needs: push_job
    if: github.ref_name == 'release'

    steps:
      - name: Simulate Production Deployment
        run: |
          echo "Prod Deployment Started"
          echo " Deploying application ..."
          sleep 10
          echo "Production Deployment Crated"
