name: Conditional Docker Pipeline
on: push

jobs:
  docker_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Show Branch
        run: echo "Branch is $GITHUB_REF"

      - name: Build docker image
        run: docker build -t demo-image:v1 .

  docker_push:
    runs-on: ubuntu-latest

    needs: docker_build

    if: github.ref == 'refs/heads/main'

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build tagged image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/python-demo-app:v2 .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/python-demo-app:v2
